# Builds the shippable Android **release** APK from source and hands it back as a
# downloadable artifact — this is how you obtain an installable Choop APK from CI.
#
# It is deliberately anonymity-safe and needs NOTHING from the repository owner to run:
#   • No secrets required. If no signing keystore is configured, the release build falls
#     back to the Android debug key (see android/app/build.gradle.kts), so `assembleFullRelease`
#     still produces an installable APK. A debug-key APK installs fine for personal/sideload use;
#     it is simply not the maintainer's official signature.
#   • A REAL signing key is used only if the maintainer adds the optional secrets below, so the
#     published `Choop-v*.apk` can be reproduced with the maintainer's identity when wanted:
#       ANDROID_KEYSTORE_BASE64   – base64 of the .jks keystore
#       ANDROID_KEYSTORE_PASSWORD – store password
#       ANDROID_KEY_ALIAS         – key alias
#       ANDROID_KEY_PASSWORD      – key password
#
# The CHANNEL IS DERIVED FROM WHERE YOU RUN, never chosen — that is what guarantees the invariant and
# makes stable/preview mixing impossible:
#
#   run on the DEFAULT branch (main)  ⇒ STABLE  (the real Choop app, com.kimchai.choop)
#   run on ANY OTHER branch           ⇒ PREVIEW (the side-by-side "Choop Preview", com.kimchai.choop.preview)
#
# So the everyday flow is exactly:
#   1. push a feature branch → dispatch here on that branch (mode: apk-only) → download the
#      "Choop-Preview-v…apk" ARTIFACT → sideload it over Choop Preview to try the branch.
#   2. like it → open a PR → merge to main.
#   3. on main → dispatch here (mode: release-auto) → cut the next STABLE release.
#
# Guard rails enforce this: a release mode is REJECTED on a branch (releases are cut from main only),
# so a branch can never become stable and main can never become preview.
#
# Triggers:
#   • workflow_dispatch – pick a `mode`:
#       apk-only       – build an installable APK, hand it back as an artifact ONLY (no tag, no
#                        Release, no commit). The only mode allowed on a branch. (default)
#       release-auto   – (main only) bump the build.gradle versionName by `bump`, commit it, tag it,
#                        cut the GitHub Release. No need to look up the last version.
#       release-manual – (main only) release at the exact numeric `version` you type.
#   • push of a version tag (v* / android-v*) – cut a Release for that tag (tags are stable; a
#     "-pre" tag is the one escape hatch for publishing a preview release).
name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'apk-only = artifact only (the only mode on a branch). release-auto / release-manual = cut a release — MAIN ONLY (rejected on a branch).'
        type: choice
        default: apk-only
        options:
          - apk-only
          - release-auto
          - release-manual
      bump:
        description: 'release-auto only — which part of the version to increment.'
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: 'release-manual only — numeric-only version like 8.3.0 (no leading "v"). Blank = keep current.'
        type: string
        default: ''
      build_demo:
        description: 'Also build the sample-data demo flavour (Choop demo APK).'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'
      - 'android-v*'

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # push the version-bump commit + create the tag/Release (release modes only)

jobs:
  release-apk:
    runs-on: ubuntu-latest
    # Mapped here because the `secrets` context can't be used in a step-level `if:` —
    # this lets the signing step below gate on presence via `env.HAS_KEYSTORE`.
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Resolve the version, the CHANNEL (derived from the ref — never chosen), and whether this run
      # publishes a Release. This is the single place that enforces "main ⇒ stable, any branch ⇒
      # preview, releases from main only". Nothing here mutates the repo — the bump is a separate,
      # gated step.
      - name: Resolve version
        id: ver
        env:
          MODE: ${{ inputs.mode }}
          BUMP: ${{ inputs.bump }}
          MANUAL: ${{ inputs.version }}
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          MODE="${MODE:-apk-only}"
          DEFAULT_BRANCH="${DEFAULT_BRANCH:-main}"
          CUR=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          CURCODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)

          bump_version() {
            IFS=. read -r MA MI PA <<< "$CUR"
            MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
            case "$BUMP" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              *)     PA=$((PA+1)) ;;
            esac
            NEW="${MA}.${MI}.${PA}"; NEWCODE=$((CURCODE+1)); DO_BUMP=true; TAG="v${NEW}"; SUFFIX=""
          }
          manual_version() {
            NEW="${MANUAL:-$CUR}"
            # versionName must stay numeric-only — UpdateCheck.isNewer parses digits.
            if ! printf '%s' "$NEW" | grep -qE '^[0-9]+(\.[0-9]+)*$'; then
              echo "::error::version must be numeric-only like 8.3.0 (no leading 'v'). Got: '$NEW'"; exit 1
            fi
            if [ "$NEW" != "$CUR" ]; then NEWCODE=$((CURCODE+1)); DO_BUMP=true; else NEWCODE="$CURCODE"; DO_BUMP=false; fi
            TAG="v${NEW}"; SUFFIX=""
          }

          if [ "$EVENT" = "push" ]; then
            # A pushed tag is a release. Tags are STABLE (they're cut from main); a "-pre" tag is the
            # single escape hatch for publishing a PREVIEW release. Channel derives from the tag.
            if printf '%s' "$REF_NAME" | grep -q -- '-pre'; then CHANNEL=preview; else CHANNEL=stable; fi
            NEW="$CUR"; NEWCODE="$CURCODE"; DO_RELEASE=true; DO_BUMP=false; TAG="$REF_NAME"; SUFFIX=""

          elif [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            # ── main ⇒ STABLE channel ──
            CHANNEL=stable
            case "$MODE" in
              apk-only)      NEW="$CUR"; NEWCODE="$CURCODE"; DO_RELEASE=false; DO_BUMP=false; TAG=""; SUFFIX="-${GITHUB_SHA::7}" ;;
              release-auto)  bump_version;   DO_RELEASE=true ;;
              release-manual) manual_version; DO_RELEASE=true ;;
              *) echo "::error::unknown mode '$MODE'"; exit 1 ;;
            esac

          else
            # ── any feature branch ⇒ PREVIEW channel, ARTIFACT ONLY ──
            CHANNEL=preview
            if [ "$MODE" != "apk-only" ]; then
              echo "::error::Releases are cut from '${DEFAULT_BRANCH}' only. You are on branch '${REF_NAME}'. Use mode=apk-only here to build a preview APK, then merge the PR and run release-auto on ${DEFAULT_BRANCH}."
              exit 1
            fi
            NEW="$CUR"; NEWCODE="$CURCODE"; DO_RELEASE=false; DO_BUMP=false; TAG=""; SUFFIX="-${GITHUB_SHA::7}"
          fi

          echo "Resolved: ref=$REF_NAME (default=$DEFAULT_BRANCH) version=$NEW code=$NEWCODE channel=$CHANNEL release=$DO_RELEASE bump=$DO_BUMP tag=${TAG:-<none>} suffix=${SUFFIX:-<none>}"
          {
            echo "new_version=$NEW"
            echo "new_code=$NEWCODE"
            echo "do_release=$DO_RELEASE"
            echo "do_bump=$DO_BUMP"
            echo "tag=$TAG"
            echo "suffix=$SUFFIX"
            echo "channel=$CHANNEL"
          } >> "$GITHUB_OUTPUT"
          # A short human summary in the run's Summary tab.
          {
            echo "### Android build"
            echo "- Mode: \`${MODE:-tag-push}\` · Channel: \`$CHANNEL\`"
            echo "- Version: \`$NEW\` (versionCode \`$NEWCODE\`)"
            echo "- Release: \`$DO_RELEASE\`${TAG:+ → tag \`$TAG\`}"
          } >> "$GITHUB_STEP_SUMMARY"

      # Only for a real release: write the new versionName/versionCode into build.gradle.kts and commit
      # the bump back to the branch you dispatched, so the tag, the Release and the APK's OWN version all
      # agree. Skipped entirely for `apk-only` (and for tag pushes), so design-iteration builds never
      # mutate the repo. Pushes use GITHUB_TOKEN, which does not re-trigger workflows (no build loop).
      - name: Bump version in source
        if: ${{ steps.ver.outputs.do_bump == 'true' }}
        env:
          NEW: ${{ steps.ver.outputs.new_version }}
          NEWCODE: ${{ steps.ver.outputs.new_code }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          sed -i -E "s/(versionName[[:space:]]*=[[:space:]]*\")[^\"]+\"/\1${NEW}\"/" app/build.gradle.kts
          sed -i -E "s/(versionCode[[:space:]]*=[[:space:]]*)[0-9]+/\1${NEWCODE}/" app/build.gradle.kts
          echo "After bump:"; grep -nE 'versionName|versionCode' app/build.gradle.kts | head -3
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Android: release v${NEW} (versionCode ${NEWCODE})" app/build.gradle.kts
          git push origin "HEAD:${BRANCH}"
          echo "BUMP_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      # Optional real signing. When the secrets are absent (forks, no-secret runs) this step is a
      # no-op and the build transparently falls back to the debug key — the APK still installs.
      - name: Configure signing (optional)
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > noop-release.jks
          cat > keystore.properties <<EOF
          storeFile=noop-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      # stable → the `full` flavor (com.kimchai.choop); preview → the `preview` flavor
      # (com.kimchai.choop.preview, label "Choop Preview"), which installs side-by-side.
      #
      # Preview builds override versionCode with 1000+<run#> (strictly increasing across ALL runs
      # and branches). That is what makes BRANCH previews installable: a feature branch usually
      # lags main's versionCode, and without the override Android would refuse the APK as a
      # downgrade over an already-installed Choop Preview. Stable never uses the override, so its
      # versionCode stays the deliberate build.gradle number.
      - name: Build release APK
        env:
          CHANNEL: ${{ steps.ver.outputs.channel }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Git provenance for the in-app build stamp (BuildConfig.GIT_SHA/GIT_BRANCH — shown in the
          # preview app's Today header so a screenshot answers "which build is this?").
          GITPROPS="-PchoopGitSha=${GITHUB_SHA::7} -PchoopGitBranch=${BRANCH}"
          if [ "$CHANNEL" = "preview" ]; then
            ./gradlew assemblePreviewRelease -PchoopVersionCodeOverride=$((1000 + GITHUB_RUN_NUMBER)) $GITPROPS
          else
            ./gradlew assembleFullRelease $GITPROPS
          fi

      - name: Build demo release APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_demo }}
        run: ./gradlew assembleDemoRelease

      # Collect the outputs under a versioned, published-asset name (Choop-v<versionName>.apk /
      # Choop-Preview-v<versionName>.apk), matching the upstream "NOOP-vX.Y.Z.apk" convention. The
      # exact name is exported as APK_NAME for the later cert-print and Release-upload steps.
      - name: Stage APKs
        env:
          VERSION: ${{ steps.ver.outputs.new_version }}
          SUFFIX: ${{ steps.ver.outputs.suffix }}
          CHANNEL: ${{ steps.ver.outputs.channel }}
        run: |
          if [ "$CHANNEL" = "preview" ]; then
            APK="Choop-Preview-v${VERSION}${SUFFIX}.apk"
            SRC="app/build/outputs/apk/preview/release/app-preview-release.apk"
          else
            APK="Choop-v${VERSION}${SUFFIX}.apk"
            SRC="app/build/outputs/apk/full/release/app-full-release.apk"
          fi
          mkdir -p ../dist
          cp "$SRC" "../dist/$APK"
          if [ -f app/build/outputs/apk/demo/release/app-demo-release.apk ]; then
            cp app/build/outputs/apk/demo/release/app-demo-release.apk "../dist/Choop-v${VERSION}${SUFFIX}-demo.apk"
          fi
          echo "APK_NAME=$APK" >> "$GITHUB_ENV"
          ls -l ../dist

      # Print the APK's signing certificate so you can confirm which key signed it. Compare the
      # "SHA-256 digest" printed here against your keystore's fingerprint
      # (keytool -list -v -keystore choop-release.jks). They match ⇒ CI signed with YOUR key;
      # if it instead shows the Android debug cert, the ANDROID_KEYSTORE_* secrets weren't picked up.
      # Informational only — never fails the build.
      - name: Print APK signing certificate
        run: |
          set +e
          echo "Keystore secret present (HAS_KEYSTORE): $HAS_KEYSTORE"
          APKSIGNER=$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}" -name apksigner -type f 2>/dev/null | sort -V | tail -1)
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs "../dist/$APK_NAME" | grep -i "SHA-256\|Signer"
          else
            echo "apksigner not found; skipping certificate print"
          fi

      # Name the artifact after the APK itself so the download is `<APK_NAME>.zip`
      # (e.g. Choop-v8.2.5.apk.zip, or Choop-v8.2.5-<sha>.apk.zip) instead of the generic
      # noop-android-apk.zip. GitHub always wraps artifacts in a zip named after the artifact; the
      # .apk inside keeps the same base name. APK_NAME is exported by the Stage APKs step above.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: dist/*.apk
          if-no-files-found: error

      # Publish (or update) a GitHub Release and attach the APK. Runs only when the resolved mode is a
      # release (release-auto / release-manual) or a version tag was pushed — never for `apk-only`. The
      # tag/Release is created if missing (CI creates the tag when dispatched) so it shows up under
      # /releases/latest, which the in-app "Check for updates" reads. Targets the bump commit when there
      # was one, else the checked-out SHA.
      - name: Publish APK to Release
        if: ${{ steps.ver.outputs.do_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.ver.outputs.tag }}
          CHANNEL: ${{ steps.ver.outputs.channel }}
          TARGET_SHA: ${{ env.BUMP_SHA || github.sha }}
        run: |
          echo "Publishing release $TAG at $TARGET_SHA (channel: $CHANNEL)"
          # Preview releases are marked PRE-RELEASE: GitHub's /releases/latest then excludes them,
          # so the stable app's update check never offers a preview build; the preview app reads the
          # full release list and picks them up.
          EXTRA=""
          NOTES="Automated Choop release build. Install $APK_NAME (updates in place over an existing Choop install signed with the same key)."
          if [ "$CHANNEL" = "preview" ]; then
            EXTRA="--prerelease"
            NOTES="Choop PREVIEW channel build — installs side-by-side with stable Choop as \"Choop Preview\". Install $APK_NAME. Keep your strap paired to stable Choop; feed Preview via a .noopbak import (see android/MIGRATION.md)."
          fi
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --target "$TARGET_SHA" --title "$TAG" $EXTRA \
              --notes "$NOTES"
          fi
          gh release upload "$TAG" "../dist/$APK_NAME" --clobber --repo "$REPO"